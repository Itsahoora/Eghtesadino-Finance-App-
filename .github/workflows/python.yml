name: Python Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run unit tests
      run: |
        python tests/test_financial_features.py

    - name: Run theme tests
      run: |
        python tests/run_theme_tests.py

    - name: Check imports
      run: |
        python -c "from models.financial_advisor import FinancialAdvisor; print('Model import OK')"
        python -c "from utils.theme_manager import theme_manager; print('Theme manager import OK')"
        python -c "from utils.ui_components import Card; print('UI components import OK')"
